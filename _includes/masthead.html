<div class="masthead" id="site-masthead">
  <div id="reading-progress-bar"></div>
  <div class="masthead__inner-wrap">
    {% assign nav_author = site.author %}
    <nav id="site-nav" class="site-nav" aria-label="Primary navigation">
      <a class="site-nav__brand" href="/#tab-about" target="_self">
        <span class="site-nav__brand-mark">ZC</span>
        <span class="site-nav__brand-copy">
          <span class="site-nav__brand-name">{{ nav_author.name }}</span>
          {% if site.description %}<span class="site-nav__brand-title">{{ site.description }}</span>{% endif %}
        </span>
      </a>

      <ul class="visible-links site-nav__links">
        {% for link in site.data.navigation.main %}
          {% assign tab_id = link.url | remove: "/#tab-" %}
          <li class="masthead__menu-item" data-nav-tab="{{ tab_id }}"><a href="{{ domain }}{{ link.url }}" target="_self">{{ link.title }}</a></li>
        {% endfor %}
      </ul>

      <button id="dark-mode-toggle" class="dark-mode-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
        <span class="dark-mode-toggle__icon dark-mode-toggle__icon--sun">&#9728;</span>
        <span class="dark-mode-toggle__icon dark-mode-toggle__icon--moon">&#9790;</span>
      </button>
    </nav>
  </div>
</div>
